experiment_name: tabnet_ect
model_type: tabnet_advanced
architecture_type: ect
target_col: label

paths:
  train_csv: ../../results/features_raw/features_train.csv
  val_csv: ../../results/features_raw/features_val.csv
  test_csv: ../../results/features_raw/features_test.csv
  memmap_dir: ../../results/modeling/tabnet/memmap
  output_dir: ../../results/modeling/tabnet/ect

training:
  random_state: 42
  max_epochs: 30
  patience: 5
  use_gpu: true
  grad_clip: 1.0

# EEG Channel Transformer settings
architecture:
  n_channels: 16           # EEG channels
  n_features_per_ch: 33   # features per channel
  d_model: 64             # transformer embedding dimension
  n_heads: 4              # attention heads (d_model must be divisible)
  n_transformer_layers: 2 # transformer encoder depth
  dropout: 0.1

model_params:
  n_d: 64
  n_a: 64
  n_steps: 5
  gamma: 1.2
  lambda_sparse: 1.0e-3
  momentum: 0.02
  mask_type: entmax

optimizer_params:
  lr: 3.0e-4
  weight_decay: 1.0e-5

scheduler_params:
  mode: max
  factor: 0.5
  patience: 3
  min_lr: 1.0e-6

data:
  batch_size: 1024
  virtual_batch_size: 128
  num_workers: 4

loss:
  type: focal
  gamma: 2.0

evaluation:
  default_threshold: 0.5

plots:
  save_pr_curve: true
  save_roc_curve: true
  save_threshold_plot: true
  save_confusion_matrix: true
