experiment_name: tuned_random_forest_optuna
model_type: random_forest
target_col: label

paths:
  train_csv: ../../results/features_raw/features_train.csv
  val_csv: ../../results/features_raw/features_val.csv
  test_csv: ../../results/features_raw/features_test.csv
  output_dir: ../../results/modeling/random_forest/tuned_optuna

data:
  meta_cols:
    - path
    - start_sec
    - end_sec
    - label
    - recording_path
    - subject_id
    - age
    - sex
    - subject
    - window_idx
    - start
    - end
  dtype: float32

training:
  random_state: 42
  n_jobs: 8

model_params:
  n_jobs: 8
  random_state: 42

evaluation:
  default_threshold: 0.5

plots:
  save_pr_curve: true
  save_roc_curve: true
  save_threshold_plot: true
  save_confusion_matrix: true
  save_feature_importance: true

optuna:
  n_trials: 15
